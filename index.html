<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Event Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .sidebar-link:hover { background: #f1f5f9; border-left: 4px solid #4f46e5; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <div class="flex h-screen overflow-hidden">
        <nav class="w-64 bg-white border-r border-gray-200 hidden lg:block">
            <div class="p-6">
                <span class="text-2xl font-bold text-indigo-600">SmartEvent</span>
            </div>
            <ul class="mt-4 space-y-2">
                <li class="sidebar-link px-6 py-3 cursor-pointer text-indigo-600 font-semibold bg-indigo-50 border-left-4 border-indigo-600">
                    <i class="fa-solid fa-gauge-high mr-3"></i> Overview
                </li>
                <li class="sidebar-link px-6 py-3 cursor-pointer text-gray-500">
                    <i class="fa-solid fa-calendar-check mr-3"></i> All Events
                </li>
                <li class="sidebar-link px-6 py-3 cursor-pointer text-gray-500">
                    <i class="fa-solid fa-qrcode mr-3"></i> QR Scanner
                </li>
                <li class="sidebar-link px-6 py-3 cursor-pointer text-gray-500">
                    <i class="fa-solid fa-gear mr-3"></i> Automation
                </li>
            </ul>
        </nav>

        <main class="flex-1 overflow-y-auto p-4 md:p-8">
            <header class="flex flex-wrap justify-between items-center mb-8 gap-4">
                <div>
                    <h2 class="text-2xl font-bold">Annual Tech Summit 2026</h2>
                    <p class="text-gray-500">Live Status: <span class="text-green-600 font-medium">In Progress</span></p>
                </div>
                <div class="flex gap-3">
                    <button class="bg-white border border-gray-200 px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-50 transition">Export Report</button>
                    <button class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700 shadow-lg transition">Live Stream</button>
                </div>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8" id="statsGrid">
                </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-bold text-gray-800">Check-in Velocity</h3>
                        <select class="text-sm border-none bg-gray-100 rounded-md p-1 focus:ring-0">
                            <option>Real-time</option>
                            <option>Last Hour</option>
                        </select>
                    </div>
                    <canvas id="liveChart" height="120"></canvas>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h3 class="font-bold text-gray-800 mb-6">Live Activity Feed</h3>
                    <div class="space-y-6" id="activityFeed">
                        </div>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
